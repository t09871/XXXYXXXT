; settings.ini | HBMR v2.5.15 | 2026-06-20 PDT

[video]

; seconds between sampled frames
sample_every_seconds = 2.0

; maximum sampled frames exported per video
max_frames_per_video = 300

; JPEG quality for exported sampled frames
jpeg_quality = 95

; clear old sampled frames before exporting new ones
clear_old_sampled_frames = true


[identity]

; autonomous provisional identity mode
; Bird001, Bird002, Bird003...
AutoName = true

; canonical provisional identity prefix
AutoNamePrefix = Bird

; zero-padded autoname digit count
AutoNameDigits = 3

; maximum autoname allocation range
AutoNameMax = 999

; default identity status for autonomous ingestion
DefaultIdentityStatus = provisional

; default review status for autonomous ingestion
DefaultReviewStatus = auto


[review]

; automatically open generated review page
OpenReviewPage = false

; automatically open generated review contact sheet
OpenReviewContactSheet = false

; latest profile pictures shown in contact sheet
ReviewSheetMaxImages = 80


[training]

; preserve false positives for future detector training
PreserveFalsePositives = true

; canonical false-positive training export
FalsePositiveTrainingCSV = output/training/false-positive-training.csv


[species]

EnableSpeciesID = true
SpeciesPython = speciesnet-env\Scripts\python.exe
SpeciesScript = speciesid.py

; species annotations are crop-level only, not identity authority
SpeciesAnnotationTable = crop_species

; current scaffold model label until a real classifier is connected
SpeciesModelName = HBMR-speciesid-placeholder
SpeciesModelVersion = speciesid-v0.1.0
